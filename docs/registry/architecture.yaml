# ─── API DECISIONS ───────────────────────────────────────────────────────────
# Which engine APIs are chosen for which purpose across the project.
# Conflicts: two ADRs using different APIs for the same purpose = inconsistent
# implementation that breaks when one system expects the other's API.
#
# Register an API decision when the choice is non-obvious and other ADRs might
# make a different choice for the same purpose without knowing this was decided.

api_decisions:
  - purpose: rendering_layer_management
    status: active
    api: CanvasLayer.layer (integer Z-index)
    not: node tree order for cross-system Z-ordering
    adr: docs/architecture/adr-0002-canvaslayer-architecture.md
    reason: "CanvasLayer.layer provides explicit Z-ordering independent of scene tree structure. Necessary because HUD and VFX are separate Autoloads with separate scene trees."
    referenced_by:
      - docs/architecture/adr-0002-canvaslayer-architecture.md
    added: 2026-05-24
    revised: ""

  - purpose: object_pooling
    status: active
    api: pre-allocation in _ready() with acquire()/release()/get_active_count() interface
    not: runtime new() or queue_free() for pooled node types
    adr: docs/architecture/adr-0003-object-pooling.md
    reason: "Zero runtime allocation avoids GC stutter. Fixed pool sizes provide predictable memory footprint (270 CpuParticles2D + 12 AudioStreamPlayer ≈ 55 KB)."
    referenced_by:
      - docs/architecture/adr-0003-object-pooling.md
    added: 2026-05-24
    revised: ""

  - purpose: config_data_format
    status: active
    api: "@export var on DataConfig.gd (scalars/arrays) + Custom Resource .tres files (structured multi-field data)"
    not: JSON files, CSV files, or hardcoded const in system scripts
    adr: docs/architecture/adr-0005-data-configuration.md
    reason: "@export var provides editor-inspectable, type-safe, zero-loading-overhead config. Custom Resources provide typed multi-field data with autocomplete. JSON loses type safety; hardcoded consts scatter configuration."
    referenced_by:
      - docs/architecture/adr-0005-data-configuration.md
    added: 2026-05-24
    revised: ""

  - purpose: input_map_configuration
    status: active
    api: InputMap.add_action() + InputMap.action_add_event() in _ready() (code-based)
    not: Project Settings → Input Map editor (manual, opaque to version control)
    adr: docs/architecture/adr-0006-input-system.md
    reason: "Code-based Input Map configuration is version-controllable, diffable, and keeps all input definitions in one file. Visual editor is convenient but opaque to git."
    referenced_by:
      - docs/architecture/adr-0006-input-system.md
    added: 2026-05-24
    revised: ""

