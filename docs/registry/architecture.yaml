# ─── FORBIDDEN PATTERNS ──────────────────────────────────────────────────────
# Architecture anti-patterns explicitly banned by accepted ADRs.
# When writing a new ADR, check this list — if the proposed approach matches
# a forbidden pattern, it must be reworked before the ADR can be Accepted.
#
# Register a pattern when an ADR explicitly bans it AND other ADRs might
# unknowingly use it (i.e., it's a tempting but wrong approach for this project).

forbidden_patterns:
  - pattern: direct_cross_system_state_write
    status: active
    description: "A system must never directly assign to another Autoload's properties. Use signals or request_*() methods on the owner instead."
    why: "Direct state writes create race conditions and break the signal-driven architecture. The owning system must be the sole writer of its internal state."
    adr: docs/architecture/adr-0001-autoload-architecture.md
    added: 2026-05-24

  - pattern: forward_autoload_reference
    status: active
    description: "An Autoload registered earlier in project.godot must not reference Autoloads registered later. Earlier systems cannot assume later systems have been _ready()."
    why: "Godot loads Autoloads in order. A Foundation system referencing a Presentation system in _ready() will receive null — causing silent crashes."
    adr: docs/architecture/adr-0001-autoload-architecture.md
    added: 2026-05-24

  - pattern: runtime_node_creation_during_gameplay
    status: active
    description: "Pooled nodes (CpuParticles2D, AudioStreamPlayer) must never be created via new() or destroyed via queue_free() during gameplay. All nodes pre-allocated in _ready()."
    why: "Runtime node creation triggers scene tree updates and GC — causes frame spikes at 60fps with up to 150 simultaneous particles."
    adr: docs/architecture/adr-0003-object-pooling.md
    added: 2026-05-24

  - pattern: cross_system_pool_sharing
    status: active
    description: "Pool managers are internal to their owning system. VFX owns particle pools; Audio owns SFX pools. No system may borrow nodes from another system's pool."
    why: "Each system has different node types (CpuParticles2D vs AudioStreamPlayer) and different exhaustion strategies (recycle-oldest vs priority-preemption). Cross-system sharing would couple independent systems."
    adr: docs/architecture/adr-0003-object-pooling.md
    added: 2026-05-24

  - pattern: anonymous_signal_callbacks
    status: active
    description: "All signal connect() calls must reference named methods, never lambdas or inline anonymous functions."
    why: "Named callbacks are grep-able, stack-trace readable, and auditable. Lambda callbacks in connect() hide the signal graph from code search and make debugging harder."
    adr: docs/architecture/adr-0004-signal-bus-pattern.md
    added: 2026-05-24

  - pattern: runtime_signal_connect_disconnect
    status: active
    description: "Signals must be connected in _ready() and never disconnected/reconnected at runtime. Pooled objects use boolean guards instead of connect/disconnect."
    why: "Runtime connect/disconnect creates an invisible, changing signal graph that cannot be audited statically. This is a common source of 'signal silently not firing' bugs."
    adr: docs/architecture/adr-0004-signal-bus-pattern.md
    added: 2026-05-24

  - pattern: hardcoded_tunable_value
    status: active
    description: "No system may hardcode a numeric or string value that has a corresponding entry in a GDD 'Tuning Knobs' section. All tunable values must live in DataConfig.gd as @export var or in a .tres Custom Resource."
    why: "Hardcoded values scatter configuration across 12 files, making balancing a multi-file hunt and risking silent divergence when the same value is defined in two places."
    adr: docs/architecture/adr-0005-data-configuration.md
    added: 2026-05-24

  - pattern: direct_config_file_loading
    status: active
    description: "Only DataConfig may load configuration files from disk. No other system may call load() or ResourceLoader.load() on a .tres or data file."
    why: "DataConfig is the single source of truth (GDD data-config.md Rule 1). If other systems load config independently, they bypass DataConfig and create shadow configuration states."
    adr: docs/architecture/adr-0005-data-configuration.md
    added: 2026-05-24

  - pattern: per_system_input_config
    status: active
    description: "Systems must not define their own Input Map actions independently. All Input Map configuration happens in InputSystem._ready() via InputMap.add_action(). Systems call Input or InputSystem for input — never configure InputMap themselves."
    why: "Input Map scattered across multiple files makes keybinding audits impossible and risks action name collisions between systems."
    adr: docs/architecture/adr-0006-input-system.md
    added: 2026-05-24

  - pattern: reentrant_state_transition
    status: active
    description: "Signal handlers connected to GSM.state_changed must never call GSM.request_transition(). State transitions from within state change handlers create nested transitions and unpredictable state chains."
    why: "Re-entrant transitions bypass the transition matrix (inner transition validates against an intermediate state, not the original). The _transition_in_progress flag rejects these, but handlers should not attempt them."
    adr: docs/architecture/adr-0007-gsm-state-machine.md
    added: 2026-05-24

  - pattern: bypass_transformation_gate
    status: active
    description: "No system may set active_form_id, is_berserk, or any transformation timer directly. The 5-gate activation check in TransformationSystem.request_transformation() is the sole entry point for transformation state changes."
    why: "Bypassing the activation gates (meter check, cooldown check, state check) would allow transformation in invalid states — e.g., transforming during DEATH or with empty meter."
    adr: docs/architecture/adr-0009-transformation-system.md
    added: 2026-05-24

  - pattern: enemy_creation_outside_system
    status: active
    description: "Only EnemySystem may instantiate or despawn enemies. No other system may call enemy_scene.instantiate() or enemy.queue_free(). Enemy creation flows through EnemySystem.spawn_enemy() exclusively."
    why: "Enemy lifecycle (pool, active list, state gating) is centralized in EnemySystem. Bypassing it creates unmanaged enemies that won't respond to state changes or be counted in get_active_count()."
    adr: docs/architecture/adr-0010-enemy-system.md
    added: 2026-05-24

  - pattern: wave_spawn_outside_system
    status: active
    description: "Only WaveSystem may trigger wave progression and enemy spawn waves. No other system may call start_wave_sequence() or directly trigger wave state changes."
    why: "Wave pacing (spawn timing, intermission, boss waves) is centralized in WaveSystem. Bypassing it creates unmanaged spawn waves that don't respect wave progression or trigger wave_cleared/all_waves_cleared correctly."
    adr: docs/architecture/adr-0011-wave-system.md
    added: 2026-05-24

  - pattern: player_creation_outside_system
    status: active
    description: "Only PlayerSystem may instantiate the Player scene. No other system may call load('player.tscn').instantiate() or player.queue_free(). Player lifecycle flows through PlayerSystem._spawn_player() exclusively."
    why: "Player lifecycle (scene instantiation, spawn position, stat initialization, signal wiring) is centralized in PlayerSystem. Bypassing it creates an unmanaged player node that other systems cannot reference via PlayerSystem.player."
    adr: docs/architecture/adr-0012-player-system.md
    added: 2026-05-24

  - pattern: area_config_runtime_mutation
    status: active
    description: "No system may mutate AreaConfig properties at runtime. All area parameters (enemy_pool, background_key, bgm_track, etc.) are read-only after loading. Area transitions switch the current_area_config reference — not the data within a config."
    why: "AreaConfig is shared state read by 4+ systems. If one system mutates enemy_pool mid-wave, other systems see inconsistent area data. All area parameter changes must happen via DataConfig .tres edits + game restart."
    adr: docs/architecture/adr-0013-area-system.md
    added: 2026-05-24

  - pattern: per_system_ui_elements
    status: active
    description: "Systems must not create their own UI elements (Control nodes, Labels, TextureProgressBars). All UI elements live under HUDSystem's CanvasLayers (3=HUD_Core, 4=HUD_Overlay). No other system may own or create UI nodes."
    why: "Distributed UI creation scatters Z-ordering control across systems, risks CanvasLayer conflicts, and duplicates fade/Tween/animation logic. Centralizing UI under HUDSystem ensures consistent Z-ordering, unified animation feel, and a single visibility table."
    adr: docs/architecture/adr-0014-hud-ui-system.md
    added: 2026-05-24

  - pattern: vfx_creation_outside_system
    status: active
    description: "Only VFXSystem may manage CpuParticles2D particles, screen flash, and VFX CanvasLayer nodes. No other system may create particles, modulate CanvasLayer for visual effects, or spawn VFX nodes."
    why: "VFX pooling (270 CpuParticles2D across 6 pools), priority resolution, and CanvasLayer Z-ordering are centralized in VFXSystem. Bypassing it creates unmanaged particles that don't respect pool limits, priority tiers, or intensity settings."
    adr: docs/architecture/adr-0015-vfx-system.md
    added: 2026-05-24

  - pattern: audio_creation_outside_system
    status: active
    description: "Only AudioSystem may manage AudioStreamPlayer nodes, audio bus routing, and audio playback. No other system may call AudioStreamPlayer.play(), create AudioStreamPlayer nodes, or modify AudioServer bus volumes."
    why: "Audio pooling (12 AudioStreamPlayer across 2 pools), priority preemption (5 tiers), BGM 4-layer crossfade, and bus routing are centralized in AudioSystem. Bypassing it creates unmanaged audio players that don't respect pool limits, priority tiers, or bus volume controls."
    adr: docs/architecture/adr-0016-audio-system.md
    added: 2026-05-25

