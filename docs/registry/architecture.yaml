# Architecture Decision Registry
#
# PURPOSE: Single source of truth for key architectural stances that all ADRs
# must agree on. Skills check this before writing new ADRs to detect conflicts
# at authoring time — before stories are created against contradictory decisions.
#
# RULES:
#   - Register a stance when it constrains how OTHER systems must be built.
#     An internal implementation detail that affects only one ADR does not need
#     to be registered.
#   - Never delete entries — set status: superseded_by: ADR-NNNN instead.
#   - When a stance changes: update the entry, set revised: to today's date,
#     add a comment with the old value, and run /architecture-review to check
#     what ADRs are now invalidated.
#   - adr: is the authoritative source. All other ADRs that depend on this
#     stance list themselves in referenced_by.
#
# WRITTEN BY: /architecture-decision (Phase 5 — after ADR is approved)
# READ BY:    /architecture-decision (Step 2 — before authoring begins)
#             /architecture-review (Phase 4 — cross-ADR conflict baseline)
#             /create-stories (to embed architectural constraints in stories)
#             /dev-story (to check implementation against accepted stances)
#
# SEARCH PATTERNS (for skills using Grep):
#   All state owners:       Grep pattern="^  - state:" path="docs/registry/architecture.yaml"
#   Who owns player_health: Grep pattern="state: player_health"
#   All signal contracts:   Grep pattern="pattern: signal"
#   Budget for combat:      Grep pattern="system: combat"
#   All forbidden patterns: Grep pattern="^  - pattern:" (forbidden_patterns section)
#   Superseded entries:     Grep pattern="status: superseded"

version: 1
last_updated: "2026-05-25"

# ─── STATE OWNERSHIP ─────────────────────────────────────────────────────────
# Who is the authoritative owner of each piece of shared game state.
# Conflicts: two ADRs claiming to own the same state = data race / authority bug.
#
# Register state when it is READ or WRITTEN by more than one system.
# Internal-only state (never accessed by another system) does not need to be registered.
#
# Required fields: state, owner_system, adr, interface, referenced_by[], added
# interface: how other systems access this state (read-only property, method call,
#   signal, shared resource, etc.) — this is the contract other ADRs depend on.

state_ownership:
  - state: current_game_state
    status: active
    owner_system: GSM
    adr: docs/architecture/adr-0007-gsm-state-machine.md
    interface: "GSM.current_state (read-only State enum). GSM.state_changed(old, new) signal on transition. GSM.request_transition(target) — sole write path."
    write_access: gsm-only
    referenced_by:
      - docs/architecture/adr-0007-gsm-state-machine.md
      - docs/architecture/adr-0006-input-system.md
      - docs/architecture/adr-0003-object-pooling.md
    added: 2026-05-24
    revised: ""

  - state: meter_current
    status: active
    owner_system: absorption-system
    adr: docs/architecture/adr-0008-absorption-system.md
    interface: "AbsorptionSystem.meter_current (read-only float, range 0.0–1.0). Absorptionsystem.add_energy(amount) — sole fill path. Absorptionsystem.consume_all() — sole drain path. Signals: meter_changed, meter_full, meter_threshold_crossed."
    write_access: absorption-system-only
    referenced_by:
      - docs/architecture/adr-0008-absorption-system.md
      - docs/architecture/adr-0003-object-pooling.md
      - docs/architecture/adr-0007-gsm-state-machine.md
    added: 2026-05-24
    revised: ""

  - state: transformation_state
    status: active
    owner_system: transformation-system
    adr: docs/architecture/adr-0009-transformation-system.md
    interface: "TransformationSystem.active_form_id (read-only String), is_berserk (read-only bool), cooldown_remaining (read-only float), duration_remaining (read-only float). Signals: transformation_started, transformation_expired, berserk_activated, berserk_expired, cooldown_complete, transformation_failed. Sole write: request_transformation(form_id)."
    write_access: transformation-system-only
    referenced_by:
      - docs/architecture/adr-0009-transformation-system.md
      - docs/architecture/adr-0007-gsm-state-machine.md
      - docs/architecture/adr-0008-absorption-system.md
    added: 2026-05-24
    revised: ""

  - state: player_state
    status: active
    owner_system: player-system
    adr: docs/architecture/adr-0012-player-system.md
    interface: "PlayerSystem.hp_current (read-only float), PlayerSystem.hp_max (read-only float), PlayerSystem.global_position (read-only Vector2). Signals: player_hit(damage), damage_dealt(target, amount), player_died(), hp_changed(new_hp). Sole write: PlayerController.take_damage() via enemy collision."
    write_access: player-system-only
    referenced_by:
      - docs/architecture/adr-0012-player-system.md
      - docs/architecture/adr-0010-enemy-system.md
      - docs/architecture/adr-0008-absorption-system.md
      - docs/architecture/adr-0009-transformation-system.md
    added: 2026-05-24
    revised: ""

  - state: wave_progression
    status: active
    owner_system: wave-system
    adr: docs/architecture/adr-0011-wave-system.md
    interface: "WaveSystem.current_wave (read-only int), total_waves (read-only int). WaveSystem.start_wave_sequence(). Signals: wave_started, wave_cleared, boss_wave_started, all_waves_cleared, intermission_started, intermission_ended."
    write_access: wave-system-only
    referenced_by:
      - docs/architecture/adr-0011-wave-system.md
      - docs/architecture/adr-0010-enemy-system.md
    added: 2026-05-24
    revised: ""

  - state: enemy_pools
    status: active
    owner_system: enemy-system
    adr: docs/architecture/adr-0010-enemy-system.md
    interface: "EnemySystem.spawn_enemy(type, position) -> EnemyController. EnemySystem.despawn_all(). EnemySystem.get_active_count() -> int. Signals: enemy_spawned, enemy_defeated(position, type, energy_value), all_enemies_despawned."
    write_access: enemy-system-only
    referenced_by:
      - docs/architecture/adr-0010-enemy-system.md
      - docs/architecture/adr-0003-object-pooling.md
      - docs/architecture/adr-0008-absorption-system.md
    added: 2026-05-24
    revised: ""

  - state: area_identity
    status: active
    owner_system: area-system
    adr: docs/architecture/adr-0013-area-system.md
    interface: "AreaSystem.current_area_id (read-only String), AreaSystem.current_area_config (read-only AreaConfig), AreaSystem.total_areas (read-only int). AreaSystem.get_enemy_pool_for_wave(wave) -> Array[EnemyPoolEntry]. Signals: area_changing, area_changed, area_load_failed, all_areas_cleared. Sole write: _activate_area()."
    write_access: area-system-only
    referenced_by:
      - docs/architecture/adr-0013-area-system.md
      - docs/architecture/adr-0011-wave-system.md
    added: 2026-05-24
    revised: ""

