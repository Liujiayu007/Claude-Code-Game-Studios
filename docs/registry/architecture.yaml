# ─── PERFORMANCE BUDGETS ──────────────────────────────────────────────────────
# Frame time allocations per system, against a defined total frame budget.
# Conflicts: allocations that sum to more than the total budget = unshippable.
#
# Register a budget when an ADR explicitly claims a frame time allocation.
# The registry lets /architecture-review verify the total doesn't exceed the target.

performance_budgets:
  - system: vfx_pooling
    status: active
    budget_ms: 0.05
    adr: docs/architecture/adr-0003-object-pooling.md
    notes: "Pool acquire/release O(n) scan across 270 CpuParticles2D nodes. Worst case burst pool (80) scan cost at 60fps."
    referenced_by:
      - docs/architecture/adr-0003-object-pooling.md
    added: 2026-05-24
    revised: ""

  - system: audio_pooling
    status: active
    budget_ms: 0.02
    adr: docs/architecture/adr-0003-object-pooling.md
    notes: "12 AudioStreamPlayer nodes across 2 pools. Priority preemption O(n) scan. Negligible per-frame cost."
    referenced_by:
      - docs/architecture/adr-0003-object-pooling.md
    added: 2026-05-24
    revised: ""

  - system: audio_system
    status: active
    budget_ms: 0.02
    adr: docs/architecture/adr-0016-audio-system.md
    notes: "SFX playback O(1) + priority preemption O(n) over 8 channels (< 0.001ms). BGM crossfade via Tween (zero per-frame CPU). Charging pitch move_toward() + linear_to_db() (< 0.01ms). Heartbeat timer check (< 0.001ms). Only active during COMBAT/TRANSFORMATION states."
    referenced_by:
      - docs/architecture/adr-0016-audio-system.md
    added: 2026-05-25
    revised: ""

