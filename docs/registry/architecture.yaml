# ─── INTERFACE CONTRACTS ──────────────────────────────────────────────────────
# How systems are required to communicate with each other.
# Conflicts: one ADR expects signal, another expects direct call = integration bug.
#
# Register a contract when the communication pattern between two systems is
# explicitly decided in an ADR and other systems must follow the same pattern.
#
# pattern options: signal | direct_call | event_bus | shared_resource | rpc | none

interfaces:
  - contract: autoload_init_order
    status: active
    pattern: direct_call
    producer: project.godot [autoload]
    consumers:
      - all 12 MVP systems
    adr: docs/architecture/adr-0001-autoload-architecture.md
    signal_signature: "Godot loads Autoloads in project-settings order. Foundation → Core → Presentation. Later systems may assume earlier ones are _ready()."
    referenced_by:
      - docs/architecture/adr-0001-autoload-architecture.md
    added: 2026-05-24
    revised: ""

  - contract: cross_system_communication
    status: active
    pattern: signal
    producer: all 12 MVP systems
    consumers:
      - all 12 MVP systems
    adr: docs/architecture/adr-0001-autoload-architecture.md
    signal_signature: "信号 (for events) + 只读属性 getter (for queries). Direct property writes forbidden. Signal naming: snake_case past tense. Payload: positional (1-3 params) or typed Dictionary (4+). Connect in _ready() only. No anonymous callbacks."
    referenced_by:
      - docs/architecture/adr-0001-autoload-architecture.md
      - docs/architecture/adr-0004-signal-bus-pattern.md
    added: 2026-05-24
    revised: 2026-05-24

  - contract: canvaslayer_z_order
    status: active
    pattern: direct_call
    producer: HUD + VFX (each owns specific CanvasLayers)
    consumers:
      - HUD system
      - VFX system
    adr: docs/architecture/adr-0002-canvaslayer-architecture.md
    signal_signature: "Layer Z: 0=GameWorld, 1=VFX_World, 2=VFX_Screen, 3=HUD_Core, 4=HUD_Overlay, 5=VFX_Overlay. Layer constants shared via DataConfig."
    referenced_by:
      - docs/architecture/adr-0002-canvaslayer-architecture.md
    added: 2026-05-24
    revised: ""

  - contract: data_config_access
    status: active
    pattern: direct_call
    producer: DataConfig (Autoload #1)
    consumers:
      - all 11 other MVP systems
    adr: docs/architecture/adr-0005-data-configuration.md
    signal_signature: "Direct @export var property read. Scalar values: DataConfig.vfx_pool_attack. Structured data: DataConfig.get_form_config(id). No signals — DataConfig is a passive data store."
    referenced_by:
      - docs/architecture/adr-0005-data-configuration.md
    added: 2026-05-24
    revised: ""

  - contract: input_system_interface
    status: active
    pattern: direct_call
    producer: InputSystem (Autoload #3)
    consumers:
      - PlayerSystem (movement + combat input)
      - HUD (menu navigation + device prompt)
      - GSM (input blocking per state)
    adr: docs/architecture/adr-0006-input-system.md
    signal_signature: "Continuous input: systems use Input.get_vector() directly. Discrete actions: InputSystem.is_action_buffered(action). Device: InputSystem.current_device + device_changed(Device) signal. Blocking: GSM calls InputSystem.set_blocked_actions(state)."
    referenced_by:
      - docs/architecture/adr-0006-input-system.md
    added: 2026-05-24
    revised: ""

  - contract: state_transition
    status: active
    pattern: signal
    producer: GSM (Autoload #2)
    consumers:
      - all 11 other MVP systems
    adr: docs/architecture/adr-0007-gsm-state-machine.md
    signal_signature: "state_changed(old_state: GSM.State, new_state: GSM.State). GSM.request_transition(target: GSM.State) -> bool. GSM.current_state (read-only). Transition matrix validates before signal emits."
    referenced_by:
      - docs/architecture/adr-0007-gsm-state-machine.md
    added: 2026-05-24
    revised: ""

  - contract: audio_playback
    status: active
    pattern: signal
    producer: upstream gameplay systems (PlayerSystem, TransformationSystem, WaveSystem, AbsorptionSystem, GSM)
    consumers:
      - AudioSystem (Autoload #12)
    adr: docs/architecture/adr-0016-audio-system.md
    signal_signature: "All audio dispatched from signal handlers. AudioSystem subscribes to GSM.state_changed, PlayerSystem.player_hit/damage_dealt/player_died, TransformationSystem.transformation_started/expired, WaveSystem.wave_started/cleared, AbsorptionSystem.meter_full/meter_changed. No system calls AudioSystem._play_sfx() directly. Parallel consumer with VFXSystem (ADR-0015) — same signals drive both."
    referenced_by:
      - docs/architecture/adr-0016-audio-system.md
    added: 2026-05-25
    revised: ""

